<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포트폴리오 | HAUEN 인테리어</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        @keyframes float-updown {
            0%   { transform: translateY(0); }
            50%  { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        .slider-arrow {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            padding: 0 18px;
            opacity: 0.8;
            transition: opacity 0.25s;
            line-height: 0;
            text-decoration: none;
        }
        .slider-arrow svg {
            width: 38px;
            height: 64px;
        }
        .slider-arrow:hover {
            opacity: 1;
            animation: float-updown 1.2s ease-in-out infinite;
        }
        .slider-arrow.disabled {
            opacity: 0.2;
            pointer-events: none;
            animation: none;
        }

        /* ── 페이지네이션 ── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 56px;
        }
        .pagination-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 1px solid #d6cfc4;
            border-radius: 50%;
            background: transparent;
            color: #6b6257;
            font-family: 'Cormorant Garamond', serif;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            user-select: none;
        }
        .pagination-btn:hover:not(:disabled) {
            background: #f5f0e8;
            border-color: #b0a898;
        }
        .pagination-btn.active {
            background: #8FB080;
            border-color: #8FB080;
            color: #fff;
            font-weight: 600;
        }
        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .pagination-arrow {
            font-size: 17px;
            letter-spacing: 0;
        }
        .pagination-ellipsis {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 6px;
            color: #b0a898;
            font-size: 14px;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav th:replace="~{fragments/layout :: navbar('hero-mode', 'portfolio')}"></nav>

<!-- 모바일 메뉴 -->
<div th:replace="~{fragments/layout :: mobile-menu}"></div>

<!-- 페이지 헤더 -->
<section class="page-header">
    <div class="page-header-bg"></div>
    <div class="page-header-overlay"></div>
    <div class="page-header-content">
        <div class="section-label" style="color:#8FB080;">PORTFOLIO</div>
        <h1 class="page-header-title">포트폴리오</h1>
        <p class="page-header-sub">우리의 작품들</p>
    </div>
</section>

<!-- 포트폴리오 목록 -->
<section id="portfolio" style="padding-top: 80px;">
    <div class="container">
        <div class="portfolio-header reveal">
            <div>
                <div class="section-label">PORTFOLIO</div>
                <h2 class="section-title">우리의 작품들</h2>
            </div>
            <p>다양한 공간에서 완성된 감각적인 디자인을 확인해 보세요.</p>
        </div>

        <!-- 필터 탭 -->
        <div class="filter-tabs reveal">
            <button class="filter-tab active" data-filter="all">전체</button>
            <button class="filter-tab" data-filter="20">20평대</button>
            <button class="filter-tab" data-filter="30">30평대</button>
            <button class="filter-tab" data-filter="40">40평대 이상</button>
        </div>

        <!-- 슬라이더 영역 -->
        <div class="portfolio-slider-wrap">

            <!-- 카드 그리드 -->
            <div class="portfolio-grid" id="portfolioGrid"></div>

            <!-- 페이지네이션 -->
            <div class="pagination" id="pagination" style="display:none;"></div>

        </div>
    </div>
</section>

<!-- FOOTER -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<!-- 플로팅 버튼 -->
<div th:replace="~{fragments/layout :: floating-buttons}"></div>

<script th:src="@{/js/main.js}"></script>
<script>
    let currentFilter = 'all';
    let currentPage   = 0;
    let totalPages    = 0;

    const grid       = document.getElementById('portfolioGrid');
    const pagination = document.getElementById('pagination');

    // 스켈레톤 shimmer 애니메이션
    const shimmerStyle = document.createElement('style');
    shimmerStyle.textContent = `
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    `;
    document.head.appendChild(shimmerStyle);

    function showSkeleton() {
        const skeletonBg = 'linear-gradient(90deg,#ede8e0 25%,#e8e0d4 50%,#ede8e0 75%)';
        grid.innerHTML = Array(6).fill(`
            <div class="portfolio-card" style="pointer-events:none;">
                <div class="portfolio-thumb" style="background:${skeletonBg};background-size:200% 100%;animation:shimmer 1.4s ease infinite;"></div>
                <div class="portfolio-info">
                    <div style="height:15px;border-radius:6px;margin-bottom:10px;width:70%;background:${skeletonBg};background-size:200% 100%;animation:shimmer 1.4s ease infinite;"></div>
                    <div style="height:12px;border-radius:6px;width:40%;background:${skeletonBg};background-size:200% 100%;animation:shimmer 1.4s ease infinite;"></div>
                </div>
            </div>
        `).join('');
    }

    function renderCards(items) {
        if (items.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 0;color:#999;">등록된 포트폴리오가 없습니다.</div>`;
            return;
        }
        grid.innerHTML = items.map(p => `
            <div class="portfolio-card" onclick="location.href='/portfolio/${p.id}'" style="cursor:pointer;">
                <div class="portfolio-thumb">
                    ${p.thumbnailUrl
                        ? `<img src="${p.thumbnailUrl}" alt="${p.title}" class="portfolio-thumb-img" />`
                        : `<div class="portfolio-thumb-img pt-1"></div>`
                    }
                </div>
                <div class="portfolio-info">
                    <h3>${p.title}</h3>
                    <div class="portfolio-meta">${p.areaPyeong}평대</div>
                </div>
            </div>
        `).join('');
    }

    function renderPagination() {
        if (totalPages <= 1) { pagination.style.display = 'none'; return; }
        pagination.style.display = 'flex';

        // 표시할 페이지 번호 계산 (최대 7개 + 말줄임)
        function pageRange(cur, total) {
            if (total <= 7) return Array.from({length: total}, (_, i) => i);
            const pages = [];
            pages.push(0);
            const left = Math.max(1, cur - 1);
            const right = Math.min(total - 2, cur + 1);
            if (left > 1) pages.push('…');
            for (let i = left; i <= right; i++) pages.push(i);
            if (right < total - 2) pages.push('…');
            pages.push(total - 1);
            return pages;
        }

        const pages = pageRange(currentPage, totalPages);

        pagination.innerHTML = `
            <button class="pagination-btn pagination-arrow" ${currentPage === 0 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">&#8592;</button>
            ${pages.map(p => p === '…'
                ? `<div class="pagination-ellipsis">···</div>`
                : `<button class="pagination-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p + 1}</button>`
            ).join('')}
            <button class="pagination-btn pagination-arrow" ${currentPage === totalPages - 1 ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">&#8594;</button>
        `;
    }

    function goPage(page) {
        if (page < 0 || page >= totalPages || page === currentPage) return;
        loadPortfolios(currentFilter, page);
        document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function loadPortfolios(filter, page) {
        showSkeleton();  // 즉시 스켈레톤 표시
        try {
            const res  = await fetch(`/api/portfolios?filter=${filter}&page=${page}`);
            const data = await res.json();
            currentFilter = filter;
            currentPage   = data.currentPage;
            totalPages    = data.totalPages;
            renderCards(data.items);
            renderPagination();
        } catch (e) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 0;color:#999;">데이터를 불러오지 못했습니다.</div>`;
        }
    }

    // 필터 탭
    document.querySelectorAll('.filter-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadPortfolios(btn.dataset.filter, 0);
        });
    });

    // 초기 로드
    loadPortfolios('all', 0);
</script>
</body>
</html>
