<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상담신청 | HAUEN 인테리어</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <!-- Flatpickr 달력 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <style>
        /* Flatpickr 커스텀 테마 */
        .flatpickr-calendar {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            font-family: 'Noto Sans KR', sans-serif;
        }
        .flatpickr-months .flatpickr-month {
            background: var(--accent);
            border-radius: 10px 10px 0 0;
            color: #fff;
            fill: #fff;
        }
        .flatpickr-current-month .flatpickr-monthDropdown-months,
        .flatpickr-current-month input.cur-year {
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 600;
        }
        .flatpickr-months .flatpickr-prev-month,
        .flatpickr-months .flatpickr-next-month {
            fill: #fff;
            color: #fff;
        }
        .flatpickr-months .flatpickr-prev-month:hover svg,
        .flatpickr-months .flatpickr-next-month:hover svg { fill: rgba(255,255,255,0.7); }
        .flatpickr-weekday {
            background: var(--bg-cream);
            color: var(--text-light);
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 600;
            font-size: 11px;
        }
        .flatpickr-weekdays { background: var(--bg-cream); }
        .flatpickr-day {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 13px;
            color: var(--text-dark);
            border-radius: 8px;
        }
        .flatpickr-day:hover,
        .flatpickr-day.prevMonthDay:hover,
        .flatpickr-day.nextMonthDay:hover {
            background: var(--bg-cream);
            border-color: var(--border);
        }
        .flatpickr-day.selected,
        .flatpickr-day.selected:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .flatpickr-day.today {
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 700;
        }
        .flatpickr-day.today:hover {
            background: var(--accent);
            color: #fff;
        }
        .flatpickr-day.prevMonthDay,
        .flatpickr-day.nextMonthDay { color: var(--text-light); }
        .flatpickr-input { cursor: pointer; }
        .flatpickr-input.active { border-color: var(--accent) !important; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav th:replace="~{fragments/layout :: navbar('hero-mode', 'contact')}"></nav>

<!-- 모바일 메뉴 -->
<div th:replace="~{fragments/layout :: mobile-menu}"></div>

<!-- 페이지 헤더 -->

<!-- CONTACT 메인 -->
<section id="contact" class="contact-page">
    <div class="container">
        <div class="contact-grid">
            <div class="contact-left reveal">
                <div class="section-label">CONTACT US</div>
                <h2 class="section-title">무료 견적 상담</h2>
                <p>전문 디자이너가 직접 방문하여 맞춤 견적을 제공해드립니다.<br />상담 신청 후 24시간 이내에 연락드리겠습니다.</p>
                <div class="contact-info-list">
                    <div class="contact-info-item">
                        <div class="contact-icon">📞</div>
                        <div><h4>전화 문의</h4><p>02-1234-5678</p></div>
                    </div>
                    <div class="contact-info-item">
                        <div class="contact-icon">📍</div>
                        <div><h4>방문 상담</h4><p>서울시 동작구 시흥대로 606,<br>동작협성휴포레시그니처 상가 227호</p></div>
                    </div>
                    <div class="contact-info-item">
                        <div class="contact-icon">🕐</div>
                        <div><h4>상담 시간</h4><p>평일 09:00 ~ 18:00 (주말 예약 가능)</p></div>
                    </div>
                    <div class="contact-info-item">
                        <div class="contact-icon">💬</div>
                        <div><h4>카카오 채널</h4><p>@디자인인테리어</p></div>
                    </div>
                </div>
            </div>

            <!-- 폼 카드 (밝은 버전) -->
            <div class="contact-form-card-light reveal reveal-delay-2">
                <h3>상담 신청서</h3>

                <!-- 성함 / 연락처 -->
                <div class="form-row">
                    <div class="form-group">
                        <label>성함 <span class="req">*</span></label>
                        <input type="text" placeholder="홍길동" />
                    </div>
                    <div class="form-group">
                        <label>연락처 <span class="req">*</span></label>
                        <input type="tel" placeholder="010-0000-0000" />
                    </div>
                </div>

                <!-- 현장주소 -->
                <div class="form-group">
                    <label>현장주소 <span class="req">*</span></label>
                    <input type="text" placeholder="예: 서울시 강남구 테헤란로 123" />
                </div>

                <!-- 건물유형 -->
                <div class="form-group">
                    <label>건물유형 <span class="req">*</span></label>
                    <input type="text" placeholder="예: 아파트, 주택, 오피스텔 등" />
                </div>

                <!-- 면적 -->
                <div class="form-group">
                    <label>면적 <span class="req">*</span></label>
                    <select>
                        <option value="" disabled selected>선택해 주세요</option>
                        <option>10평대 (33~49㎡)</option>
                        <option>20평대 (50~66㎡)</option>
                        <option>30평대 (67~99㎡)</option>
                        <option>40평대 (100~132㎡)</option>
                        <option>50평대 이상 (133㎡~)</option>
                    </select>
                </div>

                <!-- 중문 / 확장 -->
                <div class="form-row">
                    <div class="form-group">
                        <label>중문</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="jungmun" value="필요" /><span>필요</span></label>
                            <label class="radio-label"><input type="radio" name="jungmun" value="불필요" /><span>불필요</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>확장</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="expansion" value="필요" /><span>필요</span></label>
                            <label class="radio-label"><input type="radio" name="expansion" value="불필요" /><span>불필요</span></label>
                        </div>
                    </div>
                </div>

                <!-- 욕실 / 싱크대 -->
                <div class="form-row">
                    <div class="form-group">
                        <label>욕실</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="bathroom" value="욕조" /><span>욕조</span></label>
                            <label class="radio-label"><input type="radio" name="bathroom" value="파티션" /><span>파티션</span></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>싱크대</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="sink" value="ㅡ자" /><span>ㅡ자</span></label>
                            <label class="radio-label"><input type="radio" name="sink" value="ㄱ자" /><span>ㄱ자</span></label>
                            <label class="radio-label"><input type="radio" name="sink" value="ㄷ자" /><span>ㄷ자</span></label>
                        </div>
                    </div>
                </div>

                <!-- 붙박이 -->
                <div class="form-group">
                    <label>붙박이</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="builtin" value="필요" /><span>필요</span></label>
                        <label class="radio-label"><input type="radio" name="builtin" value="불필요" /><span>불필요</span></label>
                    </div>
                </div>

                <!-- 예산 -->
                <div class="form-group">
                    <label>예산 <span class="req">*</span></label>
                    <select>
                        <option value="" disabled selected>선택해 주세요</option>
                        <option>3,000만원 미만</option>
                        <option>3,000 ~ 5,000만원</option>
                        <option>5,000 ~ 7,000만원</option>
                        <option>7,000만원 ~ 1억</option>
                        <option>1억 이상</option>
                    </select>
                </div>

                <!-- 공사시작희망일 / 입주예정일 -->
                <div class="form-row">
                    <div class="form-group">
                        <label>공사시작 희망일</label>
                        <input type="text" id="startDate" placeholder="날짜를 선택해 주세요" />
                    </div>
                    <div class="form-group">
                        <label>입주예정일</label>
                        <input type="text" id="moveInDate" placeholder="날짜를 선택해 주세요" />
                    </div>
                </div>


                <!-- 요청사항 -->
                <div class="form-group">
                    <label>요청사항</label>
                    <textarea id="msgArea" placeholder="원하시는 스타일이나 특별한 요청 사항을 자유롭게 작성해 주세요."></textarea>
                    <div class="form-char-count-light" id="charCount">0/500</div>
                </div>

                <button class="btn-submit" onclick="handleSubmit(this)">상담 신청하기 &nbsp;→</button>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<!-- 플로팅 버튼 -->
<div th:replace="~{fragments/layout :: floating-buttons}"></div>

<script th:src="@{/js/main.js}"></script>
    <!-- Flatpickr -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script>
        flatpickr("#startDate", {
            locale: "ko",
            dateFormat: "Y년 m월 d일",
            minDate: "today",
            allowInput: false,
            disableMobile: false
        });
        flatpickr("#moveInDate", {
            locale: "ko",
            dateFormat: "Y년 m월 d일",
            minDate: "today",
            allowInput: false,
            disableMobile: false
        });
    </script>
</body>
