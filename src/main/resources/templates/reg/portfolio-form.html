<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포트폴리오 등록 | HAUEN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        body { background: #f5f0e8; }
        .reg-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }
        .reg-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 52px;
            width: 100%;
            max-width: 700px;
            border: 1px solid #e0d8cc;
            box-shadow: 0 4px 32px rgba(0,0,0,0.07);
        }
        .reg-card h1 {
            font-family: 'Noto Serif KR', serif;
            font-size: 24px;
            font-weight: 700;
            color: #1a1a16;
            margin-bottom: 8px;
        }
        .reg-sub { font-size: 13px; color: #8a8a7a; margin-bottom: 36px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a4a40;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .form-group label .req { color: #c8842a; margin-left: 2px; }
        .form-group input {
            width: 100%;
            background: #f5f0e8;
            border: 1px solid #e0d8cc;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            font-family: 'Noto Sans KR', sans-serif;
            color: #1a1a16;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus { border-color: #4a5e40; background: #fff; }
        .form-group input::placeholder { color: #b0a898; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* 이미지 업로드 드롭존 */
        .dropzone {
            border: 2px dashed #c8b89a;
            border-radius: 12px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #f5f0e8;
        }
        .dropzone:hover, .dropzone.dragover { border-color: #4a5e40; background: #eee8dc; }
        .dropzone input[type="file"] { display: none; }
        .dropzone-icon { font-size: 32px; margin-bottom: 8px; }
        .dropzone-text { font-size: 14px; color: #8a8a7a; }
        .dropzone-text strong { color: #4a5e40; }
        .dropzone-hint { font-size: 11px; color: #b0a898; margin-top: 4px; }

        /* 미리보기 그리드 */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 14px;
        }
        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0d8cc;
        }
        .preview-item img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .preview-item .remove-btn {
            position: absolute;
            top: 4px; right: 4px;
            width: 20px; height: 20px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            line-height: 1;
        }
        .preview-item .order-badge {
            position: absolute;
            bottom: 4px; left: 4px;
            background: rgba(74,94,64,0.85);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .preview-count { font-size: 12px; color: #8a8a7a; margin-top: 8px; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #4a5e40;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-submit:hover { background: #2d3e2a; transform: translateY(-1px); }
        .btn-submit:disabled { background: #b0a898; cursor: not-allowed; transform: none; }
        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: #8a8a7a;
            text-decoration: none;
        }
        .btn-cancel:hover { color: #4a5e40; }

        @media (max-width: 600px) {
            .reg-card { padding: 32px 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="reg-wrap">
    <div class="reg-card">
        <h1>포트폴리오 등록</h1>
        <p class="reg-sub">새로운 시공 사례를 등록합니다.</p>

        <form id="regForm" th:action="@{/reg/portfolio}" th:object="${portfolio}"
              method="post" enctype="multipart/form-data">

            <!-- 제목 -->
            <div class="form-group">
                <label>제목 <span class="req">*</span></label>
                <input type="text" th:field="*{title}" placeholder="예) 모던 미니멀 30평대 아파트" required />
            </div>

            <!-- 평형 / 준공연도 -->
            <div class="form-row">
                <div class="form-group">
                    <label>평형 <span class="req">*</span></label>
                    <input type="number" th:field="*{areaPyeong}" placeholder="예) 32" min="1" required />
                </div>
                <div class="form-group">
                    <label>준공연도 <span class="req">*</span></label>
                    <input type="number" th:field="*{completionYear}" placeholder="예) 2024" min="2000" max="2100" required />
                </div>
            </div>

            <!-- 시공일 / 시공기간 -->
            <div class="form-row">
                <div class="form-group">
                    <label>시공일 <span class="req">*</span></label>
                    <input type="date" th:field="*{constructionStartDate}" required />
                </div>
                <div class="form-group">
                    <label>시공기간 (일)</label>
                    <input type="number" th:field="*{constructionDurationDays}" placeholder="예) 45" min="1" />
                </div>
            </div>

            <!-- 이미지 업로드 -->
            <div class="form-group">
                <label>이미지 <span class="req">*</span> <span style="font-weight:400;color:#b0a898;">(첫 번째 사진이 썸네일)</span></label>
                <div class="dropzone" id="dropzone">
                    <input type="file" name="imageFiles" id="imageInput" accept="image/*" multiple />
                    <div class="dropzone-icon">🖼️</div>
                    <div class="dropzone-text"><strong>클릭</strong>하거나 이미지를 여기에 끌어다 놓으세요</div>
                    <div class="dropzone-hint">jpg, png, webp · 파일당 최대 20MB</div>
                </div>
                <div class="preview-grid" id="previewGrid"></div>
                <div class="preview-count" id="previewCount"></div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">등록하기</button>
        </form>

        <a th:href="@{/portfolio}" class="btn-cancel">← 목록으로 돌아가기</a>
    </div>
</div>

<script>
    const dropzone    = document.getElementById('dropzone');
    const imageInput  = document.getElementById('imageInput');
    const previewGrid = document.getElementById('previewGrid');
    const previewCount = document.getElementById('previewCount');
    const submitBtn   = document.getElementById('submitBtn');

    let selectedFiles = [];  // File 객체 배열

    // 드롭존 클릭 → 파일 선택
    dropzone.addEventListener('click', () => imageInput.click());

    // 드래그 앤 드롭
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        addFiles(Array.from(e.dataTransfer.files));
    });

    // 파일 선택
    imageInput.addEventListener('change', () => {
        addFiles(Array.from(imageInput.files));
        imageInput.value = '';  // 같은 파일 재선택 가능하도록 초기화
    });

    function addFiles(files) {
        selectedFiles = [...selectedFiles, ...files.filter(f => f.type.startsWith('image/'))];
        renderPreviews();
    }

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        renderPreviews();
    }

    function renderPreviews() {
        previewGrid.innerHTML = '';

        selectedFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'preview-item';

            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);

            const badge = document.createElement('div');
            badge.className = 'order-badge';
            badge.textContent = index === 0 ? '썸네일' : (index + 1);

            const removeBtn = document.createElement('button');
            removeBtn.className = 'remove-btn';
            removeBtn.type = 'button';
            removeBtn.textContent = '✕';
            removeBtn.onclick = () => removeFile(index);

            item.appendChild(img);
            item.appendChild(badge);
            item.appendChild(removeBtn);
            previewGrid.appendChild(item);
        });

        previewCount.textContent = selectedFiles.length > 0
            ? `총 ${selectedFiles.length}장 선택됨`
            : '';
    }

    // 폼 제출 시 selectedFiles를 실제 input에 동기화
    document.getElementById('regForm').addEventListener('submit', function(e) {
        if (selectedFiles.length === 0) {
            e.preventDefault();
            alert('이미지를 최소 1장 이상 선택해주세요.');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '업로드 중...';

        // DataTransfer로 FileList 재구성
        const dt = new DataTransfer();
        selectedFiles.forEach(f => dt.items.add(f));
        imageInput.files = dt.files;
    });
</script>
</body>
</html>
