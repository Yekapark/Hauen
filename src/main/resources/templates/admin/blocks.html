<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>차단 관리 | HAUEN Admin</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f5f0e8; color: #3a3028; min-height: 100vh; padding: 40px 20px; }
        .wrap { max-width: 720px; margin: 0 auto; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #2D3E2A; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }

        /* 추가 폼 */
        .add-form { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 28px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        .add-form h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #4a3f35; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-row input { flex: 1; min-width: 140px; padding: 10px 14px; border: 1px solid #d6cfc4; border-radius: 8px; font-size: 14px; background: #faf8f4; }
        .form-row input:focus { outline: none; border-color: #8FB080; }
        .btn-block { padding: 10px 22px; background: #3a3028; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .btn-block:hover { background: #2D3E2A; }

        /* 목록 */
        .list-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); overflow: hidden; }
        .list-header { padding: 18px 24px; border-bottom: 1px solid #ede8e0; font-size: 15px; font-weight: 600; color: #4a3f35; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #f0ebe0; color: #7a6e62; font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: 500; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px 20px; text-align: left; font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #ede8e0; background: #faf8f4; }
        td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #f5f0e8; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fdf9f4; }
        .phone-cell { font-family: monospace; font-size: 15px; letter-spacing: .5px; color: #3a3028; }
        .reason-cell { color: #7a6e62; }
        .date-cell { color: #aaa; font-size: 13px; }
        .btn-unblock { padding: 5px 14px; background: transparent; border: 1px solid #e0a0a0; color: #c06060; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .btn-unblock:hover { background: #fdf0f0; }
        .empty { padding: 48px; text-align: center; color: #bbb; font-size: 14px; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>📵 차단 번호 관리</h1>
    <p class="subtitle">차단된 번호는 상담 신청 시 403 응답을 받습니다.</p>

    <!-- 차단 추가 폼 -->
    <div class="add-form">
        <h2>번호 차단 추가</h2>
        <form th:action="@{/admin/{secret}/block(secret=${secret})}" method="post">
            <div class="form-row">
                <input type="tel" name="phone" placeholder="전화번호 (예: 01012345678)" required />
                <input type="text" name="reason" placeholder="차단 사유 (선택)" />
                <button type="submit" class="btn-block">차단</button>
            </div>
        </form>
    </div>

    <!-- 차단 목록 -->
    <div class="list-card">
        <div class="list-header">
            <span>차단 목록</span>
            <span class="badge" th:text="${blocked.size() + '건'}">0건</span>
        </div>

        <div th:if="${blocked.isEmpty()}" class="empty">차단된 번호가 없습니다.</div>

        <table th:if="${!blocked.isEmpty()}">
            <thead>
            <tr>
                <th>전화번호</th>
                <th>사유</th>
                <th>차단일시</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${blocked}">
                <td class="phone-cell" th:text="${b.phone}"></td>
                <td class="reason-cell" th:text="${b.reason != null ? b.reason : '-'}"></td>
                <td class="date-cell" th:text="${#temporals.format(b.blockedAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <form th:action="@{/admin/{secret}/unblock(secret=${secret})}" method="post" style="display:inline;">
                        <input type="hidden" name="phone" th:value="${b.phone}"/>
                        <button type="submit" class="btn-unblock"
                                onclick="return confirm('차단을 해제하시겠습니까?')">해제</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
