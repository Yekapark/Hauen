<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- ════════════════════════════════════════════
     NAVBAR
     파라미터:
       - navMode  : "hero-mode" | "sub-mode" (기본: sub-mode)
       - activeMenu: "portfolio" | "about" | "contact" | "" (기본: "")
════════════════════════════════════════════ -->
<nav th:fragment="navbar(navMode, activeMenu)"
     id="navbar"
     th:class="${navMode}">
    <a th:href="@{/}" class="nav-logo">
        <div class="nav-logo-box">
            <img class="logo-dark"  th:src="@{/images/logo-dark.png}"  alt="HAUEN 하우엔 로고" />
            <img class="logo-light" th:src="@{/images/logo-light.png}" alt="HAUEN 하우엔 로고" />
        </div>
    </a>
    <ul class="nav-links">
        <li><a th:href="@{/about}"    th:classappend="${activeMenu == 'about'}    ? ' active'">업체소개</a></li>
        <li><a th:href="@{/portfolio}" th:classappend="${activeMenu == 'portfolio'} ? ' active'">포트폴리오</a></li>
        <li><a th:href="@{/contact}" class="btn-cta">무료 상담 신청</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
    </button>
</nav>

<!-- ════════════════════════════════════════════
     모바일 메뉴
════════════════════════════════════════════ -->
<div th:fragment="mobile-menu" class="mobile-menu" id="mobileMenu">
    <ul>
        <li><a th:href="@{/about}">업체소개</a></li>
        <li><a th:href="@{/portfolio}">포트폴리오</a></li>
    </ul>
    <div class="mobile-cta">
        <a th:href="@{/contact}">무료 상담 신청</a>
    </div>
</div>

<!-- ════════════════════════════════════════════
     FOOTER
════════════════════════════════════════════ -->
<footer th:fragment="footer">
    <div class="container">
        <div class="footer-grid">
            <div class="footer-brand">
                <div class="footer-logo-wrap">
                    <img th:src="@{/images/footer-logo.png}" alt="HAUEN 하우엔 로고" />
                </div>
                <p>20년 경력의 인테리어 전문가 팀이 당신의 공간을 아름답게 완성합니다. 주거·상업·오피스 전 공간 설계 및 시공.</p>
                <div class="footer-socials">
                    <a class="social-btn" aria-label="인스타그램">📸</a>
                    <a class="social-btn" aria-label="카카오">💬</a>
                    <a class="social-btn" aria-label="유튜브">▶️</a>
                    <a class="social-btn" aria-label="페이스북">👍</a>
                </div>
            </div>
            <div class="footer-nav">
                <h4>메뉴</h4>
                <ul>
                    <li><a th:href="@{/about}">업체소개</a></li>
                    <li><a th:href="@{/portfolio}">포트폴리오</a></li>
                    <li><a th:href="@{/contact}">견적상담</a></li>
                </ul>
            </div>
            <div class="footer-contact">
                <h4>연락처</h4>
                <div class="footer-contact-list">
                    <div class="footer-contact-item"><span>📞</span><span>010-3377-0412</span></div>
                    <div class="footer-contact-item"><span>✉️</span><span>hauen.interior@gmail.com</span></div>
                    <div class="footer-contact-item" style="align-items:flex-start;">
                        <span>📍</span>
                        <span>
                            인천 연수구 신송로 122, 송도프라자 204호
                        </span>
                    </div>
                    <div class="footer-contact-item"><span>🕐</span><span>평일 09:00 ~ 18:00</span></div>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p><!-- © 2024 Design Interior. All rights reserved. --></p>
            <div class="footer-bottom-links">
                <a href="#">개인정보처리방침</a>
                <a href="#">이용약관</a>
            </div>
        </div>
    </div>
</footer>

<!-- ════════════════════════════════════════════
     플로팅 버튼
════════════════════════════════════════════ -->
<div th:fragment="floating-buttons" class="floating-buttons">
    <a href="https://pf.kakao.com/_yGndX" target="_blank" class="floating-btn floating-kakao" aria-label="카카오톡 문의">
        <img th:src="@{/images/kakao.png}" alt="카카오톡" />
    </a>
    <a href="https://www.instagram.com/hauen.studio?igsh=b3VlcXF3cm9vbjRy&utm_source=qr" target="_blank" class="floating-btn floating-instagram" aria-label="인스타그램">
        <img th:src="@{/images/instagram.png}" alt="인스타그램" />
    </a>
    <a href="https://blog.naver.com/hauendesign" target="_blank" class="floating-btn floating-blog" aria-label="네이버 블로그">
        <img th:src="@{/images/blog.png}" alt="네이버 블로그" />
    </a>
</div>

</body>
</html>
