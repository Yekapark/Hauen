spring.application.name=Hauen

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

spring.mvc.format.date=yyyy-MM-dd

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# 비즈뿌리오 카카오 알림톡 (계정 발급 후 .env에 채워넣기)
bizppurio.user-id=${BIZPPURIO_USER_ID:}
bizppurio.password=${BIZPPURIO_PASSWORD:}
bizppurio.sender=${BIZPPURIO_SENDER:}
bizppurio.template-code=${BIZPPURIO_TEMPLATE_CODE:}

# 관리자 차단 페이지 비밀 URL 키 (.env에 설정)
admin.secret=${ADMIN_SECRET:0202}

# 카카오맵 JavaScript API 키 (Kakao Developers에서 발급)
kakao.map.api-key=${KAKAO_MAP_API_KEY:}

# Cloudflare R2
cloudflare.r2.access-key=${R2_ACCESS_KEY}
cloudflare.r2.secret-key=${R2_SECRET_KEY}
cloudflare.r2.endpoint=${R2_ENDPOINT}
cloudflare.r2.bucket=${R2_BUCKET}
cloudflare.r2.public-url=${R2_PUBLIC_URL}
