spring.application.name=Hauen

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

spring.mvc.format.date=yyyy-MM-dd

spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=300MB

resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:}
notification.email=${NOTIFICATION_EMAIL:}

admin.secret=${ADMIN_SECRET:0202}

kakao.map.api-key=${KAKAO_MAP_API_KEY:}

# Cloudflare R2
cloudflare.r2.access-key=${R2_ACCESS_KEY}
cloudflare.r2.secret-key=${R2_SECRET_KEY}
cloudflare.r2.endpoint=${R2_ENDPOINT}
cloudflare.r2.bucket=${R2_BUCKET}
cloudflare.r2.public-url=${R2_PUBLIC_URL}
