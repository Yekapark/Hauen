spring.application.name=Hauen

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

spring.mvc.format.date=yyyy-MM-dd

spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=300MB

# Resend 이메일 API (https://resend.com — 무료 3,000통/월, 100통/일)
# RESEND_API_KEY     : Resend 대시보드에서 발급
# RESEND_FROM        : 발신자 주소 (예: 하우엔 인테리어 <info@yourdomain.com>)
#                      도메인 없으면 일단 onboarding@resend.dev 사용 가능 (테스트용)
# NOTIFICATION_EMAIL : 알림 받을 이메일 주소
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:}
notification.email=${NOTIFICATION_EMAIL:}

# 관리자 차단 페이지 비밀 URL 키 (.env에 설정)
admin.secret=${ADMIN_SECRET:0202}

# 카카오맵 JavaScript API 키 (Kakao Developers에서 발급)
kakao.map.api-key=${KAKAO_MAP_API_KEY:}

# Cloudflare R2
cloudflare.r2.access-key=${R2_ACCESS_KEY}
cloudflare.r2.secret-key=${R2_SECRET_KEY}
cloudflare.r2.endpoint=${R2_ENDPOINT}
cloudflare.r2.bucket=${R2_BUCKET}
cloudflare.r2.public-url=${R2_PUBLIC_URL}
